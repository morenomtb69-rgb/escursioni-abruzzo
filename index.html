<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anello Colline Vestine | Gruppo Ciclo CAI Pescara</title>
<meta name="description" content="Scheda escursione cicloturistica — Anello Colline Vestine, Riserva Lago di Penne — Farindola. Gruppo Ciclo CAI Pescara.">
<style>
:root {
  --bg: #f5f3ee;
  --card: #fff;
  --ink: #203127;
  --muted: #627064;
  --line: #d9dfd6;
  --accent: #315f3b;
  --soft: #eaf1e8;
  --soft2: #f3edd1;
  --shadow: 0 12px 34px rgba(0,0,0,.10);
  --radius: 22px;
  --warning: #fff3cd;
  --warning-border: #ffc107;
  --warning-text: #856404;
}

* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body { margin: 0; font-family: Arial, Helvetica, sans-serif; background: var(--bg); color: var(--ink); line-height: 1.55; }
a { color: inherit; text-decoration: none; }
img { max-width: 100%; display: block; }

.wrap { width: min(1180px, calc(100% - 28px)); margin: 0 auto; }

.topbar {
  position: sticky;
  top: 0;
  z-index: 20;
  background: rgba(250,248,243,.95);
  border-bottom: 1px solid rgba(0,0,0,.06);
  backdrop-filter: blur(10px);
}
.topbar-inner {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 18px;
  padding: 14px 0;
}
.brand { display: flex; align-items: center; gap: 12px; font-weight: 700; }
.brand-badge {
  width: 46px; height: 46px;
  border-radius: 50%;
  background: var(--soft);
  display: grid;
  place-items: center;
  font-size: 22px;
}
.brand small { display: block; font-weight: 700; letter-spacing: .02em; color: var(--accent); }
.menu { display: flex; gap: 18px; flex-wrap: wrap; color: var(--muted); font-weight: 700; }
.menu a:hover { color: var(--accent); }

.hero {
  min-height: 72vh;
  color: #fff;
  background: linear-gradient(rgba(14,20,16,.28), rgba(14,20,16,.55)),
              url('banner-lago-penne.jpg') center/cover no-repeat;
  display: flex;
  align-items: flex-end;
}
.hero-inner {
  padding: 52px 0 34px;
  width: min(1180px, calc(100% - 28px));
  margin: 0 auto;
}
.hero-grid {
  display: grid;
  grid-template-columns: 1.55fr .85fr;
  gap: 22px;
  align-items: end;
}
.kicker {
  display: inline-block;
  padding: 9px 14px;
  border-radius: 999px;
  background: rgba(255,255,255,.14);
  border: 1px solid rgba(255,255,255,.22);
  font-size: 14px;
  margin-bottom: 14px;
}
h1 { margin: 0 0 10px; font-size: clamp(38px,6vw,66px); line-height: 1.02; }
.hero h2 { margin: 0 0 10px; font-size: clamp(24px,3vw,38px); font-weight: 400; }
.hero .lead { margin: 0; font-size: clamp(18px,2.2vw,28px); opacity: .95; }

.hero-panel {
  background: rgba(255,255,255,.14);
  border: 1px solid rgba(255,255,255,.18);
  box-shadow: var(--shadow);
  backdrop-filter: blur(10px);
  border-radius: 24px;
  padding: 20px;
}
.status {
  display: inline-block;
  background: rgba(45,97,61,.86);
  padding: 10px 14px;
  border-radius: 999px;
  font-weight: 700;
  margin-bottom: 14px;
}
.hero-actions { display: grid; gap: 12px; margin-top: 8px; }

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  border: none;
  border-radius: 14px;
  padding: 14px 18px;
  font-weight: 700;
  cursor: pointer;
  font-size: 15px;
  transition: transform .18s ease, box-shadow .18s ease;
}
.btn:hover { transform: translateY(-1px); box-shadow: var(--shadow); }
.btn-primary  { background: #56bf4e; color: #fff; }
.btn-secondary { background: #fff; color: var(--accent); }
.btn-outline  { background: transparent; color: #fff; border: 1px solid rgba(255,255,255,.38); }

.quickstats {
  display: grid;
  grid-template-columns: repeat(6,1fr);
  gap: 14px;
  margin-top: -32px;
  position: relative;
  z-index: 3;
}
.stat {
  background: var(--card);
  border-radius: 20px;
  box-shadow: var(--shadow);
  padding: 18px 16px;
  text-align: center;
}
.stat strong { display: block; font-size: 30px; line-height: 1; margin-bottom: 8px; color: var(--accent); }
.stat span   { color: var(--muted); font-weight: 700; font-size: 14px; }

.section { padding: 42px 0; }
.grid-main {
  display: grid;
  grid-template-columns: 1.35fr .75fr;
  gap: 24px;
}
.card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 24px; }
.card h3 { margin: 0 0 16px; font-size: 28px; }

.meta-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 14px; }
.meta-grid div { background: var(--soft); border-radius: 16px; padding: 14px; }
.meta-grid span { display: block; color: var(--muted); font-size: 14px; margin-bottom: 4px; }

.badge-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
.badge { background: var(--soft2); border-radius: 999px; padding: 9px 12px; font-weight: 700; color: #5b532f; }

.experience-list { display: grid; gap: 14px; }
.experience {
  background: linear-gradient(180deg,#fbfcf9,#f1f6ef);
  border: 1px solid var(--line);
  border-radius: 18px;
  padding: 16px;
}
.experience strong { display: block; margin-bottom: 6px; }

table { width: 100%; border-collapse: collapse; }
th, td { text-align: left; padding: 12px 10px; border-bottom: 1px solid var(--line); vertical-align: top; }
th { color: var(--muted); font-size: 14px; }

.profile-wrap { margin-top: 24px; }
.profile-wrap h4 { font-size: 18px; margin: 0 0 12px; color: var(--ink); font-weight: 700; }
.profile-wrap img { border-radius: 16px; width: 100%; object-fit: contain; box-shadow: 0 4px 18px rgba(0,0,0,.08); }

.gallery-shell {
  display: grid;
  grid-template-columns: 1.25fr .75fr;
  gap: 24px;
  align-items: start;
}
.gallery-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 14px; }
.gallery-card {
  margin: 0;
  position: relative;
  overflow: hidden;
  border-radius: 20px;
  background: #ddd;
  box-shadow: var(--shadow);
}
.gallery-card img { width: 100%; height: 100%; aspect-ratio: 4/3; object-fit: cover; }
.gallery-card figcaption {
  position: absolute;
  left: 0; right: 0; bottom: 0;
  padding: 12px 14px;
  color: #fff;
  font-weight: 700;
  font-size: 14px;
  background: linear-gradient(transparent, rgba(0,0,0,.58));
}
.story-box img { border-radius: 18px; margin-top: 16px; aspect-ratio: 4/5; object-fit: cover; }

.footer { padding: 30px 0 60px; color: var(--muted); font-size: 14px; }
.notice { margin-top: 14px; font-size: 14px; color: #6b6241; font-style: italic; }

.warning-box {
  background: var(--warning);
  border-left: 5px solid var(--warning-border);
  padding: 16px;
  margin-bottom: 20px;
  border-radius: 8px;
  color: var(--warning-text);
